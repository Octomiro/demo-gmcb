services:

  # ════════════════════════════════════════
  # Database  
  # ════════════════════════════════════════
  db:
    image: postgres:16
    container_name: gmcb_db
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/db_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  # ════════════════════════════════════════
  # Backend  (Flask + YOLO + EfficientAD)
  # ════════════════════════════════════════
  backend:
    build:
      context: ./backend
      network: host
    ports:
      - "5000:5000"
    container_name: gmcb_backend
    restart: always
    runtime: nvidia
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - LIVE_IMAGES_ROOT=/app/liveImages
      - SCREENSHOTS_DIR=/app/feedback_screenshots
    depends_on:
      db:
        condition: service_healthy
    # Grant access to ALL V4L2 devices (major 81) without requiring any
    # specific device to exist at container startup. Cameras that are not
    # plugged in simply won't be available — the app handles that gracefully.
    device_cgroup_rules:
      - 'c 81:* rmw'
    group_add:
      - video
    volumes:
      - /dev:/dev
      - ./data/liveImages:/app/liveImages
      - ./data/videos:/app/videos
      - /home/adam/YOLO_Benchmark/ultralytics/testAnomalie-Trim.mp4:/app/videos/testAnomalie-Trim.mp4:ro
      - ./data/feedback_screenshots:/app/feedback_screenshots
    deploy:
      resources:
        reservations:
          cpus: '16'
          memory: 16G
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        limits:
          cpus: '28'
          memory: 22G

  # ════════════════════════════════════════
  # Frontend 
  # ════════════════════════════════════════
  frontend:
    build:
      context: ./frontend
      network: host
    container_name: gmcb_frontend
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      - backend
    ports:
      - "5020:80"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

volumes:
  pgdata: