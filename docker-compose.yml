services:

  # ════════════════════════════════════════
  # Database  
  # ════════════════════════════════════════
  db:
    image: postgres:16
    container_name: gmcb_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/db_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  # ════════════════════════════════════════
  # Backend  (Flask + YOLO + EfficientAD)
  # ════════════════════════════════════════
  backend:
    build:
      context: ./backend
      network: host
    container_name: gmcb_backend
    restart: unless-stopped
    runtime: nvidia
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - LIVE_IMAGES_ROOT=/app/liveImages
      - SCREENSHOTS_DIR=/app/feedback_screenshots
    depends_on:
      db:
        condition: service_healthy
    devices:
      - /dev/video0:/dev/video0
      - /dev/video2:/dev/video2  # Uncomment when camera is connected
    group_add:
      - video
    volumes:
      - ./data/liveImages:/app/liveImages
      - ./data/videos:/app/videos
      - ./data/feedback_screenshots:/app/feedback_screenshots
    deploy:
      resources:
        reservations:
          cpus: '16'
          memory: 16G
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        limits:
          cpus: '28'
          memory: 22G

  # ════════════════════════════════════════
  # Frontend 
  # ════════════════════════════════════════
  frontend:
    build:
      context: ./frontend
      network: host
    container_name: gmcb_frontend
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      - backend
    ports:
      - "8094:80"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

volumes:
  pgdata: