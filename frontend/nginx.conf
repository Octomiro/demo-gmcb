server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── SPA: all non-file routes fall back to index.html ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy API calls to the backend container ──
    location /api/ {
        proxy_pass         http://backend:5000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    # ── Proxy MJPEG video stream (disable buffering for live feed) ──
    location /video_feed {
        proxy_pass         http://backend:5000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 86400s;   # keep stream open for 24h
        chunked_transfer_encoding off;
    }

    # ── Proof images served by backend ──
    location /api/proof/ {
        proxy_pass         http://backend:5000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }
}
